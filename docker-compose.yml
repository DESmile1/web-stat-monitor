version: '3.8'
services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=qwerty123
      - POSTGRES_DB=monitoring
    volumes:
      - pgdata:/var/lib/postgresql/data

  checker:
    build: .
    container_name: my_web_monitor
    depends_on: [db]
    volumes:
      - ./logs:/app/reports
    environment:
      - SITES_TO_CHECK=https://google.com,https://github.com,https://op.edu.ua
      - PYTHONUNBUFFERED=1

  adminer:
    image: adminer
    container_name: db_web_client
    ports: ["8080:8080"]

volumes:
  pgdata: