version: '3.8'
services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=monitoring
    volumes:
      - pgdata:/var/lib/postgresql/data

  checker:
    build: .
    container_name: my_web_monitor
    ports:
      - "8000:8000"
    depends_on: [db]
    volumes:
      - ./logs:/app/reports
    environment:
      - SITES_TO_CHECK=https://google.com,https://github.com,https://op.edu.ua
      - PYTHONUNBUFFERED=1

  adminer:
    image: adminer
    container_name: db_web_client
    ports: ["8080:8080"]

  prometheus:
    image: prom/prometheus
    container_name: prometheus_service
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana_service
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
volumes:
  pgdata: